name: Deploy Website

on:
  push:
    branches: ["main"] # Run this every time I push to 'main'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Files
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # This uploads everything in your current folder

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4